<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ironbound — POI Zone Layout v2</title>
<link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400&family=Alegreya+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#141618;
  --bg-warm:#181b1e;
  --bg-card:#1e2226;
  --bg-card-hover:#252a2f;
  --bg-inset:#12151a;
  --bg-deep:#0e1014;
  --border:#303840;
  --border-warm:#3a4450;
  --border-active:#5a6878;
  --border-gold:#8898a8;
  --text:#c0c8d4;
  --text-bright:#e0e6ee;
  --text-mid:#8898a8;
  --text-dim:#506070;
  --text-faint:#384450;
  --gold:#90a8c0;
  --gold-dim:#607888;
  --gold-glow:rgba(144,168,192,0.15);
  --red:#a04848;
  --red-dim:#502828;
  --green:#4a8870;
  --green-dim:#1e3830;
  --blue:#5888c0;
  --blue-dim:#283848;
  --blue-bright:#78b0e0;
  --cyan:#4a9098;
  --highlight:rgba(144,168,192,0.10);
  --highlight-strong:rgba(144,168,192,0.20);
  --highlight-border:rgba(144,168,192,0.45);
  --toolbar-h:44px;
  --diamond:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  --font-title:'Almendra',serif;
  --font-ui:'Alegreya Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:13px;-webkit-font-smoothing:antialiased}

/* ═══ TOOLBAR ═══ */
#toolbar{
  height:var(--toolbar-h);display:flex;align-items:center;gap:16px;padding:0 14px;
  background:linear-gradient(180deg,#1c2028 0%,#141820 100%);
  border-bottom:1px solid var(--border);position:relative;z-index:50;user-select:none;
}
#toolbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--gold-dim) 50%,transparent 95%);opacity:0.4}
.tb-seg{display:flex;align-items:center;gap:5px;font-family:var(--font-ui);font-size:11px;font-weight:500;color:var(--text-mid);letter-spacing:0.04em}
.tb-seg b{color:var(--gold);font-family:var(--font-mono);font-weight:500;font-size:12px}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.tb-spacer{flex:1}
.tb-btn{
  height:28px;padding:0 14px;font-family:var(--font-ui);font-size:10.5px;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;color:var(--text-mid);
  background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all .12s;
}
.tb-btn:hover{border-color:var(--border-active);color:var(--text-bright);background:var(--bg-card-hover)}
.tb-btn.end-turn{color:var(--gold);border-color:var(--gold-dim);background:linear-gradient(180deg,#1e2838,#182030)}
.tb-btn.end-turn:hover{background:linear-gradient(180deg,#283448,#1e2838);border-color:var(--gold)}

/* ═══ MAIN ═══ */
#main{display:flex;height:calc(100vh - var(--toolbar-h))}

/* ═══ PANELS ═══ */
.panel{display:flex;flex-direction:column;height:100%;overflow:hidden;background:var(--bg-warm)}
.panel-head{
  padding:8px 12px;font-family:var(--font-title);font-size:12px;letter-spacing:0.06em;
  color:var(--text-dim);border-bottom:1px solid var(--border);background:var(--bg-deep);
  flex-shrink:0;display:flex;align-items:center;gap:8px;
}
.panel-head .ph-icon{font-size:13px;opacity:0.5}
.panel-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.panel-scroll::-webkit-scrollbar{width:4px}
.panel-scroll::-webkit-scrollbar-track{background:transparent}
.panel-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.panel-scroll::-webkit-scrollbar-thumb:hover{background:var(--border-warm)}

/* Resize handles */
.col-handle{width:5px;background:var(--bg-deep);cursor:col-resize;flex-shrink:0;position:relative;border-left:1px solid var(--border);border-right:1px solid var(--border);transition:background .12s}
.col-handle:hover,.col-handle.active{background:var(--gold-dim)}
.row-handle{height:5px;background:var(--bg-deep);cursor:row-resize;flex-shrink:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .12s}
.row-handle:hover{background:var(--gold-dim)}

/* ═══ TASK QUEUE ═══ */
#taskpanel{min-width:130px}

/* Task panel action buttons */
.task-actions{padding:6px 8px;border-bottom:1px solid var(--border);background:var(--bg-deep);display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.task-act-btn{
  width:100%;padding:5px 8px;font-family:var(--font-ui);font-size:10px;font-weight:600;
  letter-spacing:0.03em;text-align:left;color:var(--text-mid);
  background:var(--bg-card);border:1px solid var(--border);cursor:pointer;
  transition:all .1s;display:flex;align-items:center;gap:5px;
}
.task-act-btn:hover:not(.disabled){border-color:var(--border-active);color:var(--text-bright);background:var(--bg-card-hover)}
.task-act-btn.disabled{opacity:0.35;cursor:default}
.task-act-btn.primary-act{border-color:var(--gold-dim);color:var(--gold)}
.task-act-btn.primary-act:hover:not(.disabled){border-color:var(--gold);background:linear-gradient(180deg,#1e2838,#182030)}

/* Zone selection popup */
.zone-pick-mask{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:550;display:flex;align-items:center;justify-content:center;animation:fadeIn .1s}
.zone-pick{background:var(--bg-card);border:1px solid var(--border-active);box-shadow:0 12px 40px rgba(0,0,0,0.7);width:280px;display:flex;flex-direction:column}
.zone-pick-head{padding:8px 12px;font-family:var(--font-title);font-size:12px;color:var(--text-bright);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.zone-pick-body{padding:4px 0;max-height:300px;overflow-y:auto}
.zone-pick-opt{
  padding:7px 12px;font-size:12px;color:var(--text);cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:background .06s;font-family:var(--font-ui);
}
.zone-pick-opt:hover{background:var(--highlight-strong);color:var(--gold)}
.zone-pick-opt .zp-state{font-size:8px;font-family:var(--font-mono);color:var(--text-faint);margin-left:auto}
.zone-pick-opt .zp-ico{font-size:12px;opacity:0.5;width:16px;text-align:center}
.task-card{
  padding:8px 10px;border-bottom:1px solid #1a2028;cursor:pointer;
  transition:background .08s;position:relative;
}
.task-card:hover{background:var(--bg-card-hover)}
.task-card.hl{background:var(--highlight-strong);box-shadow:inset 3px 0 0 var(--gold)}
.task-slots{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.slot{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slot-sq{width:24px;height:24px;border:1px solid var(--border);border-radius:2px;background:var(--bg-inset)}
.slot-sq.filled-tree{background:var(--green-dim);border-color:#2a4838}
.slot-sq.filled-rock{background:#303438;border-color:#404850}
.slot-sq.filled-char{background:var(--blue-dim);border-color:#3a4860}
.slot-sq.filled-char-enemy{background:var(--red-dim);border-color:#503038}
.slot-dia{width:26px;height:26px;clip-path:var(--diamond);background:var(--bg-inset);border:none}
.slot-dia.filled{background:var(--blue-dim)}
.slot-dia.filled-enemy{background:var(--red-dim)}
.slot-arrow{color:var(--text-faint);font-size:9px;margin:0 1px}
.task-unasgn{font-size:9px;color:var(--text-faint);font-style:italic;font-family:var(--font-ui)}
.task-pbar{height:3px;background:var(--bg-deep);border-radius:2px;overflow:hidden}
.task-pbar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px}
.task-empty-msg{padding:14px 10px;color:var(--text-faint);font-size:11px;font-style:italic}

/* Task card top row: drag handle + label + cancel */
.task-top{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.task-drag{
  cursor:grab;color:var(--text-faint);font-size:10px;flex-shrink:0;
  padding:2px 2px 2px 0;line-height:1;user-select:none;transition:color .1s;
}
.task-drag:hover{color:var(--text-mid)}
.task-drag:active{cursor:grabbing}
.task-label{font-family:var(--font-title);font-size:11px;color:var(--text-bright);line-height:1.2;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:0}
.task-cancel{
  flex-shrink:0;width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  background:none;border:1px solid transparent;color:var(--text-faint);
  font-size:11px;line-height:1;cursor:pointer;border-radius:2px;transition:all .1s;padding:0;
}
.task-cancel:hover{color:var(--red);border-color:var(--red-dim);background:var(--red-dim)}

/* Drag state */
.task-card.dragging{opacity:0.4}
.task-card.drag-over-top{box-shadow:inset 0 2px 0 var(--gold)}
.task-card.drag-over-bot{box-shadow:inset 0 -2px 0 var(--gold)}

/* Task appear animation: builds from nothing → highlight → overshoot → settle at highlight */
.task-card.task-flash{animation:taskFlash 1.2s ease-out}
@keyframes taskFlash{
  0%{background:rgba(144,168,192,0.08);transform:translateX(-3px);opacity:0.6}
  17%{background:rgba(144,168,192,0.14);transform:translateX(0);opacity:1}
  33%{background:rgba(144,168,192,0.20);transform:translateX(0)}
  50%{background:rgba(144,168,192,0.32);box-shadow:inset 3px 0 0 rgba(144,168,192,0.6)}
  67%{background:rgba(144,168,192,0.40);box-shadow:inset 3px 0 0 rgba(144,168,192,0.8)}
  83%{background:rgba(144,168,192,0.32);box-shadow:inset 3px 0 0 rgba(144,168,192,0.6)}
  100%{background:rgba(144,168,192,0.20);box-shadow:inset 3px 0 0 var(--gold)}
}

/* ═══ GROUPS PANEL ═══ */
#grppanel{min-width:190px}
.grp-card{
  padding:10px 16px;border-bottom:1px solid var(--border);
  transition:background .1s;cursor:default;
}
.grp-card:hover{background:var(--bg-card)}
.grp-card.hl{background:var(--highlight)}
.grp-card.enemy{border-left:3px solid var(--red)}
.grp-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.grp-name{font-family:var(--font-title);font-size:14px;color:var(--text-bright);font-weight:700}
.grp-tag{font-size:8px;font-family:var(--font-mono);font-weight:500;padding:2px 6px;border-radius:2px;letter-spacing:0.05em;text-transform:uppercase}
.grp-tag.player{background:var(--blue-dim);color:var(--blue-bright)}
.grp-tag.enemy{background:var(--red-dim);color:#d08080}

/* Character diamonds */
.chars-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.char-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;overflow:visible}
.char-gem{
  width:42px;height:42px;cursor:pointer;
  position:relative;transition:transform .15s;
}
.char-gem .gem-fill{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  clip-path:var(--diamond);font-family:var(--font-mono);font-size:10px;font-weight:700;color:#fff;
  position:relative;z-index:2;
}
.char-gem .gem-fill.player{background:linear-gradient(135deg,#385888,#4870a8)}
.char-gem .gem-fill.enemy{background:linear-gradient(135deg,#783838,#a04848)}
/* Glow layer — sits behind gem-fill, slightly larger diamond */
.char-gem::before{
  content:'';position:absolute;z-index:1;pointer-events:none;
  inset:-4px;clip-path:var(--diamond);
  background:transparent;transition:background .15s,box-shadow .15s;
}
.char-gem:hover{transform:scale(1.08);z-index:2}
/* ── SELECTED: bright silver glow ── */
.char-gem.selected{transform:scale(1.12);z-index:3}
.char-gem.selected::before{
  background:var(--gold);
  animation:selGlow 1.6s ease-in-out infinite;
}
@keyframes selGlow{
  0%,100%{inset:-4px;opacity:1}
  50%{inset:-7px;opacity:0.75}
}
/* Silver ring visible through the gap between fill and glow */
.char-gem.selected::after{
  content:'';position:absolute;z-index:1;pointer-events:none;
  inset:-1px;clip-path:var(--diamond);
  background:var(--gold);
}
/* ── HIGHLIGHTED: visible cool pulse ── */
.char-gem.hl{transform:scale(1.06);z-index:2}
.char-gem.hl::before{
  background:var(--gold-dim);
  animation:hlPulse 1.2s ease-in-out infinite;
}
@keyframes hlPulse{
  0%,100%{inset:-3px;opacity:0.8}
  50%{inset:-5px;opacity:0.5}
}
/* Label gets brighter when selected or highlighted */
.char-gem.selected ~ .char-lbl,.char-gem.hl ~ .char-lbl{color:var(--gold)}
.char-lbl{font-size:9px;color:var(--text-mid);font-family:var(--font-mono);text-align:center;max-width:46px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Fix #20: empty gem uses ::before for visible dashed outline */
.empty-gem{
  width:42px;height:42px;position:relative;
}
.empty-gem::before{
  content:'';position:absolute;inset:0;
  clip-path:var(--diamond);background:var(--bg-deep);opacity:0.35;
}
.empty-gem::after{
  content:'';position:absolute;inset:-2px;
  clip-path:var(--diamond);background:var(--border);opacity:0.25;
}

/* Group bottom controls */
.grp-btns{display:flex;gap:5px;margin-top:4px}
.grp-btn{
  font-size:9px;font-family:var(--font-mono);font-weight:500;letter-spacing:0.04em;
  color:var(--text-dim);background:var(--bg-inset);border:1px solid var(--border);
  padding:2px 8px;cursor:pointer;transition:all .1s;
}
.grp-btn:hover{border-color:var(--border-active);color:var(--text)}

/* Inventory expand */
.grp-inv{display:none;flex-direction:column;gap:2px;margin-top:6px;padding-top:6px;border-top:1px solid #1a2028}
.grp-inv.open{display:flex}
.inv-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-mid)}
.inv-ico{width:16px;height:16px;background:var(--bg-inset);border:1px solid var(--border);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.inv-ico svg{width:10px;height:10px}

/* ═══ ZONE OBJECTS ═══ */
#zonepanel{min-width:500px;flex:1}
.zone-sec{display:flex;flex-direction:column;overflow:hidden}
.zone-sec-head{
  padding:7px 14px;font-family:var(--font-title);font-size:11px;letter-spacing:0.06em;
  color:var(--text-dim);background:var(--bg-deep);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.zone-sec-head .cnt{font-family:var(--font-mono);color:var(--gold-dim);font-size:10px}
.zone-scroll{flex:1;overflow-y:auto}
.zone-scroll::-webkit-scrollbar{width:4px}
.zone-scroll::-webkit-scrollbar-track{background:transparent}
.zone-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Object row — taller for two rows of content items (point 6) */
.obj-row{
  display:flex;align-items:start;
  padding:7px 11px;gap:7px;min-height:54px;
  border-bottom:1px solid #161c22;cursor:pointer;transition:background .08s;position:relative;
}
.obj-row:hover{background:var(--bg-card-hover)}
.obj-row.hl{background:var(--highlight-strong);box-shadow:inset 3px 0 0 var(--gold)}

/* Column: Icon */
.obj-ico{width:33px;height:33px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative}
.obj-ico .ico-shape{width:31px;height:31px;display:flex;align-items:center;justify-content:center;border-radius:3px;position:relative}
.obj-ico .ico-shape.sq{border-radius:3px}
.obj-ico .ico-shape.dia{clip-path:var(--diamond);width:33px;height:33px;border-radius:0}
.obj-ico .ico-shape.tree-ico{background:#18302a}
.obj-ico .ico-shape.rock-ico{background:#303438}
.obj-ico .ico-shape.group-ico{background:linear-gradient(135deg,#283858,#385888)}
.obj-ico .ico-shape.group-ico.enemy-ico{background:linear-gradient(135deg,#502828,#783838)}
.obj-ico .ico-shape.unknown-tree{background:#182820;opacity:0.6}
.obj-ico .ico-shape.unknown-rock{background:#282c30;opacity:0.6}
.obj-ico .ico-shape.unknown-group{background:#283040;opacity:0.6}
.obj-ico svg{width:18px;height:18px}
.obj-asgn{
  position:absolute;right:-9px;bottom:-4px;width:20px;height:20px;clip-path:var(--diamond);
  background:var(--blue);display:flex;align-items:center;justify-content:center;
  font-size:8px;color:#fff;font-family:var(--font-mono);font-weight:700;z-index:2;
}

/* Group members row (collapsed view) */
.grp-members-row{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.grp-mem-dia{width:24px;height:24px;clip-path:var(--diamond);display:flex;align-items:center;justify-content:center;font-size:8px;font-family:var(--font-mono);color:#fff;font-weight:700}
.grp-mem-dia.p{background:linear-gradient(135deg,#385888,#4870a8)}
.grp-mem-dia.e{background:linear-gradient(135deg,#783838,#a04848)}

/* ── Group frame: faction-colored outline ── */
.grp-frame{
  border:2px solid var(--border);border-radius:5px;margin:3px 6px;
  overflow:hidden;transition:border-color .15s;
}
.grp-frame.faction-player{border-color:#3a6090}
.grp-frame.faction-enemy{border-color:#904040}
.grp-frame:hover{border-color:var(--border-active)}
.grp-frame.hl{border-color:var(--highlight-border);background:var(--highlight)}

/* Group header bar (always visible) */
.grp-frame-header{
  display:flex;align-items:center;gap:6px;padding:4px 8px;
  background:var(--bg-deep);cursor:pointer;user-select:none;
}
.grp-frame-header .grp-expand-btn{
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--text-dim);flex-shrink:0;transition:color .1s;
}
.grp-frame-header:hover .grp-expand-btn{color:var(--text)}
.grp-frame-header .grp-frame-name{
  font-family:var(--font-title);font-size:12px;color:var(--text-bright);font-weight:600;flex:1;
}
.grp-frame-header .grp-frame-tag{
  font-size:8px;font-family:var(--font-mono);padding:1px 5px;border-radius:2px;letter-spacing:0.04em;text-transform:uppercase;
}
.grp-frame-tag.ft-player{background:var(--blue-dim);color:var(--blue-bright)}
.grp-frame-tag.ft-enemy{background:var(--red-dim);color:#d08080}

/* Group collapsed body: shown as a normal obj-row inside the frame */
.grp-frame-body{border-top:1px solid var(--border)}
.grp-frame-body .obj-row{margin:0;border-bottom:none}

/* Group expanded: character rows stacked */
.grp-expanded{display:none;border-top:1px solid var(--border)}
.grp-expanded.open{display:block}
.grp-char-row{
  display:flex;align-items:start;padding:5px 8px;gap:6px;min-height:44px;
  border-bottom:1px solid var(--border);position:relative;
}
.grp-char-row:last-child{border-bottom:none}
.grp-char-sep{
  font-size:8px;font-family:var(--font-mono);color:var(--text-faint);
  padding:2px 8px;background:var(--bg-deep);border-bottom:1px solid var(--border);
  letter-spacing:0.05em;
}

/* Column: Name + Type + Size */
.obj-core{min-width:90px;width:120px;flex-shrink:0;padding-top:1px}
.obj-name{font-size:13px;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;line-height:1.3}
.obj-name.known-name{color:var(--text-dim);font-style:italic}
.obj-type{font-size:9px;font-family:var(--font-mono);color:var(--text-dim);opacity:0.7;line-height:1.2}
.obj-size{font-size:10px;font-family:var(--font-mono);color:var(--text-dim)}

/* Column: Materials — pile icons only */
.obj-col-mat{width:110px;flex-shrink:0;display:flex;gap:0;flex-wrap:wrap;padding-top:3px;align-content:start}

/* Column: Tags */
.obj-col-tags{width:120px;flex-shrink:0;display:flex;gap:3px;flex-wrap:wrap;padding-top:3px;align-content:start}
.obj-tag{
  font-size:9px;font-family:var(--font-mono);color:var(--text-mid);
  background:var(--bg-inset);border:1px solid var(--border);border-radius:3px;
  padding:1px 6px;cursor:default;transition:border-color .1s;white-space:nowrap;
}
.obj-tag:hover{border-color:var(--border-active);color:var(--text-bright)}

/* Column: Content — darker background, fills height (point 5: slightly narrower) */
.obj-col-cnt{flex:1;min-width:50px;padding:3px 5px;position:relative;background:rgba(8,12,18,0.5);border-radius:3px;align-self:stretch}
.obj-cnt-placeholder{font-size:10px;color:var(--text-faint);font-style:italic;font-family:var(--font-ui)}

/* Visibility bar — silver color (point 2), wider (point 4) */
.vis-bar-wrap{display:flex;align-items:center;gap:0;cursor:default;position:relative}
.vis-eye{width:16px;height:16px;color:var(--text-dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-right:3px}
.vis-eye svg{width:14px;height:14px;opacity:0.5}
.vis-bar-track{width:64px;height:5px;background:var(--bg-deep);border:1px solid var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.vis-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#808898,#b0b8c8);transition:width .2s}

/* Pile-based item display */
.pile-grid{display:flex;gap:0;flex-wrap:wrap;align-items:start}
.pile-item{
  width:22px;height:22px;background:var(--bg-inset);border-radius:3px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  border:2px solid var(--border);position:relative;cursor:default;
  transition:background .1s,border-color .1s;
}
.pile-item:hover{background:var(--bg-card-hover);border-color:var(--border-active)}
.pile-item svg{width:12px;height:12px;opacity:0.8}
.pile-item.pile-3{border-color:#a0a0b0;box-shadow:inset 0 0 3px rgba(160,160,180,0.2)}
.pile-item.pile-3:hover{border-color:#c0c0d0}
.pile-item.pile-10{border-color:#8848b0;box-shadow:inset 0 0 3px rgba(136,72,176,0.25)}
.pile-item.pile-10:hover{border-color:#a868d0}

.obj-cnt-toggle{
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  background:var(--bg-inset);border:1px solid var(--border);border-radius:3px;
  color:var(--text-dim);font-size:9px;cursor:pointer;flex-shrink:0;transition:all .1s;
}
.obj-cnt-toggle:hover{border-color:var(--border-active);color:var(--text)}
.obj-cnt-expanded{display:none;margin-top:3px;padding:4px;background:var(--bg-deep);border:1px solid var(--border);border-radius:3px;gap:0;flex-wrap:wrap}
.obj-cnt-expanded.open{display:flex}
.obj-cnt-more{font-size:9px;font-family:var(--font-mono);color:var(--text-dim);padding:0 2px;flex-shrink:0;line-height:22px}

/* Column: Status Effects */
.obj-col-fx{width:92px;flex-shrink:0;display:flex;gap:3px;flex-wrap:wrap;padding-top:3px;align-content:start}
.fx-dot{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-family:var(--font-mono);color:#fff;font-weight:700;
  cursor:default;position:relative;flex-shrink:0;
}
.fx-dot.fx-buff{background:linear-gradient(135deg,#204838,#306850);border:1px solid #408868}
.fx-dot.fx-debuff{background:linear-gradient(135deg,#402830,#603840);border:1px solid #804858}
.fx-dot.fx-neutral{background:linear-gradient(135deg,#283040,#384858);border:1px solid #486878}

/* Shared tooltip styles */
.tip-popup{
  position:fixed;z-index:9999;
  background:var(--bg-card);border:1px solid var(--border-active);box-shadow:0 8px 28px rgba(0,0,0,0.7);
  padding:9px 13px;max-width:250px;min-width:145px;
  font-size:11px;font-family:var(--font-ui);color:var(--text);
  line-height:1.5;border-radius:3px;pointer-events:none;
}
.tip-popup .tip-title{font-weight:700;color:var(--text-bright);margin-bottom:3px;font-size:12px}
.tip-popup .tip-bar{height:6px;background:var(--bg-deep);border-radius:3px;overflow:hidden;margin-bottom:4px}
.tip-popup .tip-bar-fill{height:100%;border-radius:3px}
.tip-popup .tip-bar-fill.bar-buff{background:var(--green)}
.tip-popup .tip-bar-fill.bar-debuff{background:var(--red)}
.tip-popup .tip-bar-fill.bar-neutral{background:var(--blue)}
.tip-popup .tip-charges{font-size:10px;font-family:var(--font-mono);color:var(--text-dim);margin-bottom:3px}
/* Item tooltip specifics */
.tip-popup .tip-item-ico{width:32px;height:32px;background:var(--bg-inset);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;border:2px solid var(--border)}
.tip-popup .tip-item-ico svg{width:20px;height:20px;opacity:0.9}
.tip-popup .tip-item-ico.tip-pile-3{border-color:#a0a0b0}
.tip-popup .tip-item-ico.tip-pile-10{border-color:#8848b0}
.tip-popup .tip-item-row{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.tip-popup .tip-item-meta{font-size:10px;font-family:var(--font-mono);color:var(--text-dim)}
.tip-popup .tip-gold{color:var(--gold)}

/* Undiscovered section */
.undiscovered-msg{padding:14px 16px;color:var(--text-faint);font-size:12px;font-style:italic;line-height:1.5;font-family:var(--font-title)}

/* ═══ DROPDOWN ═══ */
#dropdown{
  position:fixed;z-index:500;min-width:180px;
  background:var(--bg-card);border:1px solid var(--border-active);
  box-shadow:0 10px 40px rgba(0,0,0,0.7),0 0 0 1px rgba(0,0,0,0.3);
  padding:4px 0;display:none;
}
#dropdown.open{display:block;animation:ddOpen .1s ease-out}
@keyframes ddOpen{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
#dropdown .dd-head{padding:6px 12px;font-size:9px;font-family:var(--font-mono);color:var(--text-faint);letter-spacing:0.06em;border-bottom:1px solid #1a2028;text-transform:uppercase}
#dropdown .dd-opt{
  padding:6px 12px;font-size:12px;color:var(--text);cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:background .06s;font-family:var(--font-ui);
}
#dropdown .dd-opt:hover{background:var(--highlight-strong);color:var(--gold)}
#dropdown .dd-opt.disabled{color:var(--text-faint);cursor:default;pointer-events:none}
#dropdown .dd-opt svg{width:14px;height:14px;opacity:0.4}
#dropdown .dd-warn{padding:6px 12px;font-size:10px;color:var(--red);font-style:italic;border-top:1px solid #1a2028}

/* ═══ POPUP ═══ */
.popup-mask{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:600;display:flex;align-items:center;justify-content:center;animation:fadeIn .12s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.popup{background:var(--bg-card);border:1px solid var(--border-active);box-shadow:0 20px 60px rgba(0,0,0,0.8);width:440px;max-height:70vh;display:flex;flex-direction:column}
.popup-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-family:var(--font-title);font-size:13px;color:var(--text-bright)}
.popup-close{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:2px 6px;transition:color .1s}
.popup-close:hover{color:var(--text)}
.popup-body{padding:10px 14px;overflow-y:auto;font-size:12px;color:var(--text-mid);line-height:1.6}
.log-line{padding:3px 0;border-bottom:1px solid #161c22}
.log-turn{font-family:var(--font-mono);font-size:10px;color:var(--gold-dim);margin-right:6px}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #1a2028}
.cfg-label{font-size:12px;color:var(--text)}
.cfg-val{font-family:var(--font-mono);font-size:11px;color:var(--gold)}
.tog{width:34px;height:17px;background:var(--bg-deep);border:1px solid var(--border);border-radius:9px;cursor:pointer;position:relative;transition:all .15s}
.tog.on{background:var(--green-dim);border-color:var(--green)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;background:var(--text-mid);border-radius:50%;transition:left .15s}
.tog.on::after{left:18px;background:var(--green)}

/* ═══ CHARACTER PREVIEW POPUP ═══ */
.char-preview{
  position:fixed;z-index:650;width:420px;
  background:var(--bg-card);border:1px solid var(--border-active);
  box-shadow:0 12px 40px rgba(0,0,0,0.75);border-radius:5px;
  pointer-events:none;padding:10px;display:flex;flex-direction:column;gap:8px;
}
.cp-top{display:flex;gap:10px}
.cp-left{display:flex;flex-direction:column;gap:6px;width:140px;flex-shrink:0}
.cp-portrait{width:60px;height:60px;clip-path:var(--diamond);margin:0 auto;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:18px;font-weight:700;color:#fff}
.cp-portrait.p{background:linear-gradient(135deg,#385888,#4870a8)}
.cp-portrait.e{background:linear-gradient(135deg,#783838,#a04848)}
.cp-name{text-align:center;font-family:var(--font-title);font-size:14px;color:var(--text-bright);font-weight:700}

/* Equipment grid */
.cp-equip{display:flex;flex-direction:column;gap:2px}
.cp-equip-row{display:flex;gap:2px;justify-content:center}
.cp-slot{
  width:24px;height:24px;background:var(--bg-inset);border:1px solid var(--border);border-radius:3px;
  display:flex;align-items:center;justify-content:center;position:relative;
}
.cp-slot svg{width:12px;height:12px;opacity:0.7}
.cp-slot.empty{opacity:0.3}
.cp-slot.locked{opacity:0.15;border-style:dashed}
.cp-slot-label{
  position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  font-size:6px;font-family:var(--font-mono);color:var(--text-faint);white-space:nowrap;
}

/* Stats */
.cp-stats{display:flex;flex-direction:column;gap:3px}
.cp-stat-row{display:flex;align-items:center;gap:4px}
.cp-stat-lbl{font-size:9px;font-family:var(--font-mono);color:var(--text-dim);width:26px;flex-shrink:0}
.cp-stat-val{font-size:10px;font-family:var(--font-mono);color:var(--text-bright);font-weight:700;width:22px}
.cp-stat-bar{flex:1;height:5px;background:var(--bg-deep);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.cp-stat-bar-fill{height:100%;border-radius:2px;transition:width .2s}
.cp-stat-bar-fill.bar-lvl{background:linear-gradient(90deg,#808898,#c0c8d8)}
.cp-stat-bar-fill.bar-hp{background:linear-gradient(90deg,#802020,#d03030)}
.cp-stat-hp-track{background:#301010}

/* Right side: status effects */
.cp-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.cp-fx-title{font-size:9px;font-family:var(--font-mono);color:var(--text-dim);letter-spacing:0.04em}
.cp-fx-list{display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto}
.cp-fx-item{display:flex;align-items:center;gap:6px;padding:2px 0}
.cp-fx-dot{
  width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-family:var(--font-mono);color:#fff;font-weight:700;flex-shrink:0;
}
.cp-fx-info{flex:1;min-width:0}
.cp-fx-name{font-size:10px;color:var(--text-bright);font-weight:500;display:flex;align-items:center;gap:4px}
.cp-fx-dir{font-size:8px;font-family:var(--font-mono);color:var(--text-dim)}
.cp-fx-bar{height:4px;background:var(--bg-deep);border-radius:2px;overflow:hidden;margin-top:2px}
.cp-fx-bar-fill{height:100%;border-radius:2px}
/* Effect type colors */
.cp-fx-bar-fill.fx-c-wound{background:#d03030}
.cp-fx-bar-fill.fx-c-hunger{background:#c0a030}
.cp-fx-bar-fill.fx-c-cold{background:#70a8d0}
.cp-fx-bar-fill.fx-c-buff{background:var(--green)}
.cp-fx-bar-fill.fx-c-debuff{background:#c06060}
.cp-fx-dot.dot-wound{background:linear-gradient(135deg,#602020,#903030);border:1px solid #b04040}
.cp-fx-dot.dot-hunger{background:linear-gradient(135deg,#605020,#907830);border:1px solid #b09840}
.cp-fx-dot.dot-cold{background:linear-gradient(135deg,#204860,#306888);border:1px solid #4088b0}
.cp-fx-dot.dot-buff{background:linear-gradient(135deg,#204838,#306850);border:1px solid #408868}
.cp-fx-dot.dot-debuff{background:linear-gradient(135deg,#402830,#603840);border:1px solid #804858}

/* Bottom: inventory */
.cp-inv{border-top:1px solid var(--border);padding-top:5px}
.cp-inv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.cp-inv-title{font-size:9px;font-family:var(--font-mono);color:var(--text-dim)}
.cp-inv-cap{font-size:10px;font-family:var(--font-mono);color:var(--text-mid);font-weight:700}
.cp-inv-items{display:flex;gap:0;flex-wrap:wrap}

/* ═══ CHARACTER UNIFIED VIEW (draggable window) ═══ */
.char-view{
  position:fixed;z-index:700;width:440px;
  background:var(--bg-card);border:1px solid var(--border-active);
  box-shadow:0 16px 50px rgba(0,0,0,0.8);border-radius:5px;
  display:flex;flex-direction:column;
}
.cv-header{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  background:var(--bg-deep);border-bottom:1px solid var(--border);
  cursor:move;user-select:none;border-radius:5px 5px 0 0;
}
.cv-header-name{font-family:var(--font-title);font-size:15px;color:var(--text-bright);font-weight:700;flex:1}
.cv-header-grp{font-size:10px;font-family:var(--font-mono);color:var(--text-dim)}
.cv-close{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  background:none;border:1px solid transparent;color:var(--text-dim);
  font-size:13px;cursor:pointer;border-radius:3px;transition:all .1s;flex-shrink:0;
}
.cv-close:hover{color:var(--red);border-color:var(--red-dim);background:var(--red-dim)}

.cv-body{padding:10px;display:flex;flex-direction:column;gap:8px}
.cv-top{display:flex;gap:10px}
.cv-left{display:flex;flex-direction:column;gap:6px;width:140px;flex-shrink:0}

/* Right column: status effects on top, inventory below */
.cv-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.cv-fx-area{flex:1;min-height:80px}
.cv-inv-area{
  background:rgba(8,12,18,0.5);border-radius:3px;padding:5px 6px;min-height:50px;
}
.cv-inv-area .cp-inv-header{margin-bottom:3px}
.cv-inv-area .cp-inv-items{min-height:26px}

/* Status effect items in unified view are interactive (hoverable) */
.cv-fx-item{cursor:default;border-radius:3px;padding:3px 4px;transition:background .1s}
.cv-fx-item:hover{background:var(--bg-card-hover)}

/* Scrollbar global */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

<!-- ═══ MAIN ═══ -->
<div id="main">
  <div class="panel" id="taskpanel" style="width:10%">
    <div class="panel-head"><span class="ph-icon">☰</span> Task Queue</div>
    <div class="task-actions" id="task-actions"></div>
    <div class="panel-scroll" id="task-list"></div>

function isHL_task(t){
  if(hovTaskId===t.id) return true;
  if(selCharId&&t.assignee&&t.assignee.id===selCharId) return true;
  if(hovObjId&&t.target&&t.target.id===hovObjId) return true;
  if(hovCharId&&t.assignee&&t.assignee.id===hovCharId) return true;
  return false;
}
function isHL_char(c){
  if(selCharId===c.id) return false; // selected has its own style
  if(hovTaskId){const t=tasks.find(t=>t.id===hovTaskId);if(t&&t.assignee&&t.assignee.id===c.id) return true;}
  if(hovObjId){const t=tasks.find(t=>t.target&&t.target.id===hovObjId&&t.assignee&&t.assignee.id===c.id);if(t) return true;}
  if(hovCharId===c.id) return true;
  return false;
}
function isHL_obj(o){
  if(hovTaskId){const t=tasks.find(t=>t.id===hovTaskId);if(t&&t.target&&t.target.id===o.id) return true;}
  if(selCharId){const t=tasks.find(t=>t.assignee&&t.assignee.id===selCharId&&t.target&&t.target.id===o.id);if(t) return true;}
  if(hovCharId){const t=tasks.find(t=>t.assignee&&t.assignee.id===hovCharId&&t.target&&t.target.id===o.id);if(t) return true;}
  return false;
}

function renderTasks(){
  const el=document.getElementById('task-list');
  const gid=hovGroupId||selGroupId;
  const gt=tasks.filter(t=>t.groupId===gid);
  if(!gt.length){el.innerHTML='<div class="task-empty-msg">No tasks assigned</div>';return;}
  el.innerHTML='';
  gt.forEach((t,idx)=>{
    const hl=isHL_task(t);
    const isNew=lastAddedTaskId===t.id;
    const d=document.createElement('div');
    d.className='task-card'+(hl?' hl':'')+(isNew?' task-flash':'');
    d.dataset.tid=t.id;
    d.draggable=true;

    let slots='';
    if(t.hasTarget){
      let tc='',tsvg='';
      if(t.target){
        if(t.target.type==='tree'){tc='filled-tree';tsvg=svg('i-tree');}
        else if(t.target.type==='rock'){tc='filled-rock';tsvg=svg('i-rock');}
        else if(t.target.type==='group'){tc=t.target.faction==='enemy'?'filled-char-enemy':'filled-char';tsvg=t.target.faction==='enemy'?svg('i-wolf'):svg('i-char');}
      }
      slots+=`<div class="slot slot-sq ${tc}">${tsvg}</div><span class="slot-arrow">▸</span>`;
    }
    const ac=t.assignee?(t.assignee.faction==='enemy'?'filled-enemy':'filled'):'';
    const asvg=t.assignee?svg('i-char'):'';
    slots+=`<div class="slot slot-dia ${ac}">${asvg}</div>`;

    const unasgn=!t.assignee?'<div class="task-unasgn">unassigned</div>':'';
    d.innerHTML=`
      <div class="task-top">
        <span class="task-drag" title="Drag to reorder">⠿</span>
        <span class="task-label">${t.name}</span>
        <button class="task-cancel" title="Cancel task" data-tid="${t.id}">✕</button>
      </div>
      <div class="task-slots">${slots}</div>
      ${unasgn}
      <div class="task-pbar"><div class="task-pbar-fill" style="width:${t.progress*100}%"></div></div>`;

    // Hover highlight — toggle classes only, never rebuild DOM (prevents mouseenter/leave desync)
    d.addEventListener('mouseenter',()=>{if(dragSrcId) return;hovTaskId=t.id;updateTaskHighlights();updateZoneHighlights();updateCharHighlights()});
    d.addEventListener('mouseleave',()=>{if(dragSrcId) return;hovTaskId=null;updateTaskHighlights();updateZoneHighlights();updateCharHighlights()});

    // Cancel button
    d.querySelector('.task-cancel').addEventListener('click',e=>{
      e.stopPropagation();
      const i=tasks.findIndex(x=>x.id===t.id);
      if(i!==-1) tasks.splice(i,1);
      renderAll();
    });

    // ─── Drag-and-drop reorder ───
    d.addEventListener('dragstart',e=>{
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',t.id);
      d.classList.add('dragging');
      dragSrcId=t.id;
    });
    d.addEventListener('dragend',()=>{
      dragSrcId=null;
      renderTasks();
    });
    d.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      if(dragSrcId===t.id) return;
      const rect=d.getBoundingClientRect();
      const midY=rect.top+rect.height/2;
      el.querySelectorAll('.task-card').forEach(c=>{c.classList.remove('drag-over-top','drag-over-bot')});
      if(e.clientY<midY) d.classList.add('drag-over-top');
      else d.classList.add('drag-over-bot');
    });
    d.addEventListener('dragleave',()=>{d.classList.remove('drag-over-top','drag-over-bot')});
    d.addEventListener('drop',e=>{
      e.preventDefault();
      el.querySelectorAll('.task-card').forEach(c=>{c.classList.remove('drag-over-top','drag-over-bot')});
      const srcId=e.dataTransfer.getData('text/plain');
      if(!srcId||srcId===t.id) return;
      // Determine drop position
      const rect=d.getBoundingClientRect();
      const dropBefore=e.clientY<rect.top+rect.height/2;
      // Reorder within the global tasks array for this group
      const srcIdx=tasks.findIndex(x=>x.id===srcId);
      if(srcIdx===-1) return;
      const [moved]=tasks.splice(srcIdx,1);
      let destIdx=tasks.findIndex(x=>x.id===t.id);
      if(!dropBefore) destIdx++;
      tasks.splice(destIdx,0,moved);
      renderTasks();
    });

    el.appendChild(d);
  });
  // Fix #18: scroll to newly added task
  if(lastAddedTaskId){
    const newCard=el.querySelector(`.task-card[data-tid="${lastAddedTaskId}"]`);
    if(newCard) newCard.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

    });
    const empty=g.maxSlots-g.members.length;
    for(let i=0;i<Math.min(empty,5);i++) chars+=`<div class="char-wrap"><div class="empty-gem"></div></div>`;

    let inv='';
    g.inventory.forEach(it=>{inv+=`<div class="inv-row"><div class="inv-ico">${svg(it.icon)}</div>${it.name} ×${it.qty}</div>`});

    const tag=isEnemy?'<span class="grp-tag enemy">Hostile</span>':'<span class="grp-tag player">Player</span>';
    const isInvOpen=!!invOpenState[g.id];
    const invBtn=g.inventory.length?`<div class="grp-btn" data-act="inv" data-gid="${g.id}">Inventory ${isInvOpen?'▴':'▾'}</div>`:'';

    d.innerHTML=`
      <div class="grp-header"><span class="grp-name">${g.name}</span>${tag}</div>
      <div class="chars-row">${chars}</div>
      <div class="grp-btns">
        <div class="grp-btn" data-act="char" data-gid="${g.id}">Character</div>
        <div class="grp-btn" data-act="log" data-gid="${g.id}">Log</div>
        <div class="grp-btn" data-act="cfg" data-gid="${g.id}">Config</div>
        ${invBtn}
      </div>
      <div class="grp-inv${isInvOpen?' open':''}" id="inv-${g.id}">${inv}</div>`;

    // Group hover → show that group's tasks; clear stale task hover state (fix #1)
    d.addEventListener('mouseenter',()=>{hovGroupId=g.id;hovTaskId=null;renderTaskActions();renderTasks();updateZoneHighlights();updateCharHighlights()});
    d.addEventListener('mouseleave',()=>{hovGroupId=null;hovTaskId=null;renderTaskActions();renderTasks();updateZoneHighlights();updateCharHighlights()});
    // Group click → select group
    d.addEventListener('click',e=>{
      if(e.target.closest('.char-gem')||e.target.closest('.grp-btn')) return;
      if(!isEnemy){selGroupId=g.id;renderAll();}
    });

    el.appendChild(d);
  });

  // Character click + hover (NEVER rebuild groups DOM from hover — it kills the click)
  document.querySelectorAll('.char-gem[data-cid]').forEach(gem=>{
    gem.addEventListener('click',e=>{
      e.stopPropagation();
      const cid=gem.dataset.cid,gid=gem.dataset.gid;
      if(selCharId===cid){scrollToTarget(cid);return;}
      selCharId=cid;selGroupId=gid;
      closeDD();renderAll();scrollToTarget(cid);
    });
    gem.addEventListener('mouseenter',()=>{
      hovCharId=gem.dataset.cid;
      updateCharHighlights();
      updateTaskHighlights();
      updateZoneHighlights();
    });
    gem.addEventListener('mouseleave',()=>{
      hovCharId=null;
      updateCharHighlights();
      updateTaskHighlights();
      updateZoneHighlights();
    });
  });

  // Character label hover → show character preview popup
  document.querySelectorAll('.char-lbl[data-cid]').forEach(lbl=>{
    lbl.addEventListener('mouseenter',e=>{
      const cid=lbl.dataset.cid;
      const faction=lbl.dataset.faction;
      const ch=allCharsById[cid];
      if(ch) showCharPreview(lbl,ch,faction);
    });
    lbl.addEventListener('mouseleave',()=>{hideCharPreview();});
  });

  // Mini buttons
  document.querySelectorAll('.grp-btn[data-act]').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const act=b.dataset.act,gid=b.dataset.gid;
      if(act==='inv'){invOpenState[gid]=!invOpenState[gid];const inv=document.getElementById('inv-'+gid);inv.classList.toggle('open',invOpenState[gid]);b.textContent=invOpenState[gid]?'Inventory ▴':'Inventory ▾';}
      else if(act==='log') showLog(gid);
      else if(act==='cfg') showCfg(gid);
      else if(act==='char'){
        // Open character view for currently selected character in this group
        const g=groups.find(g=>g.id===gid);
        if(!g) return;
        const ch=selCharId?g.members.find(m=>m.id===selCharId):null;
        if(ch) openCharView(ch,g);
      }
    });
  });
}

function renderZone(){
  const locEl=document.getElementById('list-loc');
  const knEl=document.getElementById('list-kn');
  locEl.innerHTML='';knEl.innerHTML='';
  document.getElementById('cnt-loc').textContent=locatedObjs.length;
  document.getElementById('cnt-kn').textContent=knownObjs.length;
  locatedObjs.forEach(o=>locEl.appendChild(mkObj(o,'located')));
  knownObjs.forEach(o=>knEl.appendChild(mkObj(o,'known')));
}

// ═══ PILE SYSTEM ═══
function toPiles(qty,icon){
  const out=[];
  let rem=qty;
  while(rem>=10){out.push({icon,cls:'pile-10',pileQty:10,label:'Pile of 10'});rem-=10;}
  while(rem>=3){out.push({icon,cls:'pile-3',pileQty:3,label:'Pile of 3'});rem-=3;}
  while(rem>=1){out.push({icon,cls:'',pileQty:1,label:''});rem--;}
  return out;
}
function renderPiles(items){
  let html='';
  items.forEach(item=>{
    const piles=toPiles(item.qty,item.icon);
    const dn=item.name||'';
    const dt=item.type||'';
    const gmin=item.goldMin||0;
    const gmax=item.goldMax||0;
    piles.forEach(p=>{
      html+=`<div class="pile-item ${p.cls}" data-pname="${dn}" data-ptype="${dt}" data-pqty="${p.pileQty}" data-plabel="${p.label}" data-picon="${p.icon}" data-pcls="${p.cls}" data-gmin="${gmin}" data-gmax="${gmax}">${svg(p.icon)}</div>`;
    });
  });
  return html;
}

// Object type display names
const typeLabel={tree:'Tree',rock:'Rock',group:'Group',bush:'Bush',plant:'Plant',pond:'Pond',mushroom:'Mushroom'};

function mkObj(o,state){
  // ── Groups get a special frame container ──
  if(o.type==='group' && state==='located'){
    return mkGroupFrame(o);
  }

  const d=document.createElement('div');
  const pct=visPct(o);
  const isGroup=o.type==='group';

  d.className='obj-row'+(isHL_obj(o)?' hl':'');
  d.dataset.oid=o.id;
  d.dataset.state=state;

  const shape=(isGroup&&o.alive)?'dia':'sq';
  let icoClass=o.type==='tree'?'tree-ico':o.type==='rock'?'rock-ico':'group-ico';
  if(isGroup&&o.faction==='enemy') icoClass+=' enemy-ico';
  if(state==='known') icoClass='unknown-'+o.type;

  const icoSvg=state==='known'?svg('i-unknown'):(o.type==='tree'?svg('i-tree'):o.type==='rock'?svg('i-rock'):(o.faction==='enemy'?svg('i-wolf'):svg('i-char')));

  const displayName=state==='known'?(knownName[o.type]||o.name):o.name;
  const nameClass=state==='known'?'obj-name known-name':'obj-name';
  const typeLbl=typeLabel[o.type]||o.type;

  // Assigned badge
  let badge='';
  if(state==='located'){
    const at=tasks.find(t=>t.target&&t.target.id===o.id&&t.assignee);
    if(at) badge=`<div class="obj-asgn">${at.assignee.name[0]}</div>`;
  }

  // ── Known objects ──
  if(state==='known'){
    const visFrac=Math.max(0,Math.min(1,(pct-40)/60));
    const barW=Math.round(visFrac*100);
    d.innerHTML=`
      <div class="obj-ico"><div class="ico-shape ${shape} ${icoClass}">${icoSvg}</div></div>
      <div class="obj-core"><div class="${nameClass}">${displayName}</div><div class="obj-type">${typeLbl}</div><div class="obj-size">Size: ${o.size}</div></div>
      <div class="obj-col-mat"></div>
      <div class="obj-col-fx"></div>
      <div class="obj-col-cnt">
        <div class="vis-bar-wrap" data-vis-pct="${pct}"><div class="vis-eye">${svg('i-eye')}</div><div class="vis-bar-track"><div class="vis-bar-fill" style="width:${barW}%"></div></div></div>
      </div>
      <div class="obj-col-tags"></div>`;
    const vbw=d.querySelector('.vis-bar-wrap');
    if(vbw){vbw.addEventListener('mouseenter',e=>{showTipAtEvent(e,`<div>Visibility: ${pct}%</div>`);});vbw.addEventListener('mouseleave',()=>{hideTip();});}
    d.addEventListener('mouseenter',()=>{hovObjId=o.id;updateTaskHighlights();updateCharHighlights()});
    d.addEventListener('mouseleave',()=>{hovObjId=null;updateTaskHighlights();updateCharHighlights()});
    d.addEventListener('click',e=>{e.stopPropagation();openDD(o,state,e);});
    return d;
  }

  // ── Located non-group objects ──
  buildObjRow(d, o, pct, shape, icoClass, icoSvg, displayName, nameClass, typeLbl, badge, null);
  // Click → action dropdown
  d.addEventListener('click',e=>{e.stopPropagation();openDD(o,state,e);});
  // Hover → highlight
  d.addEventListener('mouseenter',()=>{hovObjId=o.id;updateTaskHighlights();updateCharHighlights()});
  d.addEventListener('mouseleave',()=>{hovObjId=null;updateTaskHighlights();updateCharHighlights()});
  return d;
}

// Build an obj-row for a non-group located object or an individual character inside a group
function buildObjRow(d, o, pct, shape, icoClass, icoSvg, displayName, nameClass, typeLbl, badge, parentGroupId){
  // Materials
  const mats=o.materials||[];
  const matsHtml=`<div class="pile-grid">${renderPiles(mats)}</div>`;

  // Tags
  const tags=o.tags||[];
  let tagsHtml='';
  tags.forEach((t,ti)=>{
    tagsHtml+=`<div class="obj-tag" data-tag-idx="${ti}" data-tag-desc="${t.desc.replace(/"/g,'&quot;')}">${t.name}</div>`;
  });

  // Content
  let cntHtml='';
  if(pct>=100){
    if(o.content&&o.content.length>0){
      const items=o.content;
      const totalPiles=items.reduce((s,c)=>s+toPiles(c.qty,c.icon).length,0);
      const PREVIEW_MAX=6;
      if(totalPiles<=PREVIEW_MAX){
        cntHtml=`<div class="pile-grid">${renderPiles(items)}</div>`;
      } else {
        const cntKey=parentGroupId?parentGroupId+'_'+o.id:o.id;
        const isOpen=!!contentOpenState[cntKey];
        let previewItems=[];let ct=0;
        for(const it of items){const p=toPiles(it.qty,it.icon);for(const pp of p){if(ct>=PREVIEW_MAX) break;previewItems.push(pp);ct++;}if(ct>=PREVIEW_MAX) break;}
        let preview='';
        previewItems.forEach(p=>{preview+=`<div class="pile-item ${p.cls}" data-pname="" data-ptype="" data-pqty="${p.pileQty}" data-plabel="${p.label}" data-picon="${p.icon}" data-pcls="${p.cls}" data-gmin="0" data-gmax="0">${svg(p.icon)}</div>`;});
        const remaining=totalPiles-PREVIEW_MAX;
        preview+=`<span class="obj-cnt-more">+${remaining}</span>`;
        preview+=`<div class="obj-cnt-toggle" data-cnt-key="${cntKey}">${isOpen?'▴':'▾'}</div>`;
        const expanded=`<div class="pile-grid">${renderPiles(items)}</div>`;
        cntHtml=`<div class="pile-grid" style="flex-wrap:nowrap;overflow:hidden">${preview}</div><div class="obj-cnt-expanded${isOpen?' open':''}" data-cnt-key="${cntKey}">${expanded}</div>`;
      }
    }
  } else {
    const visFrac=Math.max(0,Math.min(1,(pct-40)/60));
    const barW=Math.round(visFrac*100);
    cntHtml=`<div class="vis-bar-wrap" data-vis-pct="${pct}"><div class="vis-eye">${svg('i-eye')}</div><div class="vis-bar-track"><div class="vis-bar-fill" style="width:${barW}%"></div></div></div>
    <span class="obj-cnt-placeholder">Revealed at 100%</span>`;
  }

  // Status effects
  const fx=o.statusEffects||[];
  let fxHtml='';
  fx.forEach((e,fi)=>{
    const dotCls=e.type==='buff'?'fx-buff':e.type==='debuff'?'fx-debuff':'fx-neutral';
    const initial=e.name[0].toUpperCase();
    fxHtml+=`<div class="fx-dot ${dotCls}" data-fx-idx="${fi}" data-fx-name="${e.name}" data-fx-desc="${e.desc.replace(/"/g,'&quot;')}" data-fx-type="${e.type}" data-fx-charges="${e.charges}" data-fx-max="${e.maxCharges}">${initial}</div>`;
  });

  // Group members (only in collapsed group view, not in individual char rows)
  let membersHtml='';
  if(o.type==='group'&&o.groupRef){
    membersHtml='<div class="grp-members-row">';
    o.groupRef.members.forEach(m=>{
      membersHtml+=`<div class="grp-mem-dia ${o.faction==='enemy'?'e':'p'}" title="${m.name}">${m.name[0]}</div>`;
    });
    membersHtml+='</div>';
  }

  d.innerHTML=`
    <div class="obj-ico"><div class="ico-shape ${shape} ${icoClass}">${icoSvg}</div>${badge}</div>
    <div class="obj-core"><div class="${nameClass}">${displayName}</div><div class="obj-type">${typeLbl}</div><div class="obj-size">Size: ${o.size}</div>${membersHtml}</div>
    <div class="obj-col-mat">${matsHtml}</div>
    <div class="obj-col-fx">${fxHtml}</div>
    <div class="obj-col-cnt">${cntHtml}</div>
    <div class="obj-col-tags">${tagsHtml}</div>`;

  // Wire up all tooltips
  wireObjTooltips(d, o, pct);
  return d;
}

// Wire tooltip and interaction events onto an obj-row or char-row element
function wireObjTooltips(d, o, pct){
  // Content toggle
  d.querySelectorAll('.obj-cnt-toggle').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const key=btn.dataset.cntKey;
      contentOpenState[key]=!contentOpenState[key];
      const exp=d.querySelector(`.obj-cnt-expanded[data-cnt-key="${key}"]`);
      if(exp) exp.classList.toggle('open',contentOpenState[key]);
      btn.textContent=contentOpenState[key]?'▴':'▾';
    });
  });
  // Tag tooltips
  d.querySelectorAll('.obj-tag').forEach(tag=>{
    tag.addEventListener('mouseenter',()=>{showTip(tag,tag.dataset.tagDesc,tag.textContent);});
    tag.addEventListener('mouseleave',()=>{hideTip();});
  });
  // Status effect tooltips
  d.querySelectorAll('.fx-dot').forEach(dot=>{
    dot.addEventListener('mouseenter',()=>{
      const c=parseInt(dot.dataset.fxCharges),mx=parseInt(dot.dataset.fxMax);
      const pctFx=mx>0?Math.round(c/mx*100):0;
      const barCls=dot.dataset.fxType==='buff'?'bar-buff':dot.dataset.fxType==='debuff'?'bar-debuff':'bar-neutral';
      showTipRaw(dot,`<div class="tip-title">${dot.dataset.fxName}</div>
        <div class="tip-bar"><div class="tip-bar-fill ${barCls}" style="width:${pctFx}%"></div></div>
        <div class="tip-charges">${c} / ${mx} charges</div>
        <div>${dot.dataset.fxDesc}</div>`);
    });
    dot.addEventListener('mouseleave',()=>{hideTip();});
  });
  // Pile item tooltips
  d.querySelectorAll('.pile-item').forEach(pi=>{
    pi.addEventListener('mouseenter',()=>{
      const nm=pi.dataset.pname,tp=pi.dataset.ptype,qty=pi.dataset.pqty;
      const lbl=pi.dataset.plabel,icn=pi.dataset.picon,pcls=pi.dataset.pcls;
      const gmin=pi.dataset.gmin,gmax=pi.dataset.gmax;
      const icoCls=pcls==='pile-3'?' tip-pile-3':pcls==='pile-10'?' tip-pile-10':'';
      const goldStr=(gmin==='0'&&gmax==='0')?'No value':`${gmin}–${gmax} gold`;
      showTipRaw(pi,`
        <div class="tip-item-row"><div class="tip-item-ico${icoCls}">${svg(icn)}</div><div><div class="tip-title">${nm}${lbl?' — '+lbl:''}</div></div></div>
        <div class="tip-item-meta">Quantity: ${qty}</div>
        <div class="tip-item-meta">Type: ${tp}</div>
        <div class="tip-item-meta tip-gold">Value: ${goldStr}</div>`);
    });
    pi.addEventListener('mouseleave',()=>{hideTip();});
    pi.addEventListener('click',e=>{e.stopPropagation();});
  });
  // Vis bar tooltip
  d.querySelectorAll('.vis-bar-wrap').forEach(vbw=>{
    vbw.addEventListener('mouseenter',e=>{showTipAtEvent(e,`<div>Visibility: ${pct}%</div>`);});
    vbw.addEventListener('mouseleave',()=>{hideTip();});
  });
}

// ── Group frame: faction outline + collapsed/expanded ──
function mkGroupFrame(o){
  const frame=document.createElement('div');
  const pct=visPct(o);
  const isExpanded=!!groupExpandState[o.id];
  const fCls=o.faction==='enemy'?'faction-enemy':'faction-player';

  frame.className='grp-frame '+fCls+(isHL_obj(o)?' hl':'');
  frame.dataset.oid=o.id;
  frame.dataset.state='located';

  const tagCls=o.faction==='enemy'?'ft-enemy':'ft-player';
  const tagLabel=o.faction==='enemy'?'Hostile':'Player';
  const expandIcon=isExpanded?'▴':'▾';

  // Header bar
  let headerHtml=`
    <div class="grp-frame-header" data-grp-oid="${o.id}">
      <div class="grp-expand-btn">${expandIcon}</div>
      <span class="grp-frame-name">${o.name}</span>
      <span class="grp-frame-tag ${tagCls}">${tagLabel}</span>
    </div>`;

  // Collapsed body: standard obj-row with summed data
  let collapsedHtml='';
  if(!isExpanded){
    const colDiv=document.createElement('div');
    colDiv.className='grp-frame-body';
    const row=document.createElement('div');
    row.className='obj-row';
    row.dataset.oid=o.id;
    row.dataset.state='located';
    const shape='dia';
    const icoClass='group-ico'+(o.faction==='enemy'?' enemy-ico':'');
    const icoSvg=o.faction==='enemy'?svg('i-wolf'):svg('i-char');
    let badge='';
    const at=tasks.find(t=>t.target&&t.target.id===o.id&&t.assignee);
    if(at) badge=`<div class="obj-asgn">${at.assignee.name[0]}</div>`;
    buildObjRow(row, o, pct, shape, icoClass, icoSvg, o.name, 'obj-name', 'Group', badge, null);
    // Build collapsed HTML
    collapsedHtml=`<div class="grp-frame-body">${row.outerHTML}</div>`;
  }

  // Expanded body: individual character rows
  let expandedHtml='';
  if(isExpanded){
    expandedHtml='<div class="grp-expanded open">';
    const chars=o.characters||[];
    chars.forEach(ch=>{
      const charPct=visPct(o); // characters share group visibility
      expandedHtml+=`<div class="grp-char-row" data-char-id="${ch.id}">`;
      // Build inline — icon + core + mat + fx + cnt + tags
      const chShape='dia';
      const chIcoClass=o.faction==='enemy'?'group-ico enemy-ico':'group-ico';
      const chIcoSvg=o.faction==='enemy'?svg('i-wolf'):svg('i-char');
      // Materials
      const chMats=ch.materials||[];
      const chMatsHtml=`<div class="pile-grid">${renderPiles(chMats)}</div>`;
      // Status effects
      const chFx=ch.statusEffects||[];
      let chFxHtml='';
      chFx.forEach((e,fi)=>{
        const dotCls=e.type==='buff'?'fx-buff':e.type==='debuff'?'fx-debuff':'fx-neutral';
        chFxHtml+=`<div class="fx-dot ${dotCls}" data-fx-name="${e.name}" data-fx-desc="${e.desc.replace(/"/g,'&quot;')}" data-fx-type="${e.type}" data-fx-charges="${e.charges}" data-fx-max="${e.maxCharges}">${e.name[0].toUpperCase()}</div>`;
      });
      // Content
      let chCntHtml='';
      if(charPct>=100 && ch.content && ch.content.length>0){
        chCntHtml=`<div class="pile-grid">${renderPiles(ch.content)}</div>`;
      } else if(charPct<100){
        const vf=Math.max(0,Math.min(1,(charPct-40)/60));
        chCntHtml=`<div class="vis-bar-wrap" data-vis-pct="${charPct}"><div class="vis-eye">${svg('i-eye')}</div><div class="vis-bar-track"><div class="vis-bar-fill" style="width:${Math.round(vf*100)}%"></div></div></div>`;
      }
      // Tags
      const chTags=ch.tags||[];
      let chTagsHtml='';
      chTags.forEach((t,ti)=>{
        chTagsHtml+=`<div class="obj-tag" data-tag-desc="${t.desc.replace(/"/g,'&quot;')}">${t.name}</div>`;
      });
      expandedHtml+=`
        <div class="obj-ico"><div class="ico-shape ${chShape} ${chIcoClass}">${chIcoSvg}</div></div>
        <div class="obj-core"><div class="obj-name">${ch.name}</div><div class="obj-type">Character</div></div>
        <div class="obj-col-mat">${chMatsHtml}</div>
        <div class="obj-col-fx">${chFxHtml}</div>
        <div class="obj-col-cnt">${chCntHtml}</div>
        <div class="obj-col-tags">${chTagsHtml}</div>
      </div>`;
    });
    expandedHtml+='</div>';
  }

  frame.innerHTML=headerHtml + collapsedHtml + expandedHtml;

  // Wire expand toggle
  const hdr=frame.querySelector('.grp-frame-header');
  hdr.addEventListener('click',e=>{
    e.stopPropagation();
    groupExpandState[o.id]=!groupExpandState[o.id];
    renderAll();
  });

  // Wire tooltips on all content within the frame
  wireObjTooltips(frame, o, pct);

  // Hover → highlight
  frame.addEventListener('mouseenter',()=>{hovObjId=o.id;updateTaskHighlights();updateCharHighlights()});
  frame.addEventListener('mouseleave',()=>{hovObjId=null;updateTaskHighlights();updateCharHighlights()});

  // Click on collapsed body → action dropdown (but not on header or expanded chars)
  frame.querySelectorAll('.grp-frame-body .obj-row').forEach(row=>{
    row.addEventListener('click',e=>{e.stopPropagation();openDD(o,'located',e);});
  });
  // Click on expanded character rows → action dropdown for the whole group
  frame.querySelectorAll('.grp-char-row').forEach(row=>{
    row.addEventListener('click',e=>{e.stopPropagation();openDD(o,'located',e);});
  });

  return frame;
}

// ═══ TOOLTIP SYSTEM ═══
let activeTip=null;
function showTip(anchor,desc,title){
  showTipRaw(anchor,`<div class="tip-title">${title}</div><div>${desc}</div>`);
}
function showTipRaw(anchor,html){
  hideTip();
  const tip=document.createElement('div');
  tip.className='tip-popup';
  tip.innerHTML=html;
  document.body.appendChild(tip);
  activeTip=tip;
  const r=anchor.getBoundingClientRect();
  const tw=tip.offsetWidth,th=tip.offsetHeight;
  let x=r.left+r.width/2-tw/2;
  let y=r.top-th-8;
  if(y<4){y=r.bottom+8;}
  if(x<4) x=4;
  if(x+tw>window.innerWidth-4) x=window.innerWidth-tw-4;
  tip.style.left=x+'px';tip.style.top=y+'px';
}
function showTipAtEvent(ev,html){
  hideTip();
  const tip=document.createElement('div');
  tip.className='tip-popup';
  tip.innerHTML=html;
  document.body.appendChild(tip);
  activeTip=tip;
  const tw=tip.offsetWidth,th=tip.offsetHeight;
  let x=ev.clientX-tw/2;
  let y=ev.clientY-th-12;
  if(y<4){y=ev.clientY+16;}
  if(x<4) x=4;
  if(x+tw>window.innerWidth-4) x=window.innerWidth-tw-4;
  tip.style.left=x+'px';tip.style.top=y+'px';
}
function hideTip(){if(activeTip){activeTip.remove();activeTip=null;}}

function scrollToTarget(charId){
  const charTasks=tasks.filter(t=>t.assignee&&t.assignee.id===charId&&t.target);
  if(!charTasks.length) return;
  // Cycle through tasks for this character
  const prev=scrollTargetCycle[charId]||0;
  const idx=prev%charTasks.length;
  scrollTargetCycle[charId]=idx+1;
  const t=charTasks[idx];
  const row=document.querySelector(`.obj-row[data-oid="${t.target.id}"]`);
  if(row) row.scrollIntoView({behavior:'smooth',block:'center'});
}

function updateCharHighlights(){

      e.stopPropagation();

      if(!ch) return;
      const newId='t'+Date.now();

const dd=document.getElementById('dropdown');

function openDD(obj,state,ev){
  closeDD();
  const actions=getActions(obj,state);
  const noChar=!selCharId;
  const selMember=selCharId?memberById(selCharId):null;
  const charIsEnemy=selMember&&groupOfMember(selCharId)?.faction==='enemy';
  // Point 5: check if selected character belongs to the target group object
  const isOwnGroup=obj.type==='group'&&obj.groupRef&&selCharId&&obj.groupRef.members.some(m=>m.id===selCharId);

  let html=`<div class="dd-head">Actions${selMember?' — '+selMember.name:''}</div>`;
  actions.forEach(a=>{
    const disabled=noChar||charIsEnemy||isOwnGroup;
    html+=`<div class="dd-opt${disabled?' disabled':''}" data-action="${a.name}" data-oid="${obj.id}" data-state="${state}">${svg(a.icon)} ${a.name}</div>`;
  });
  if(noChar) html+=`<div class="dd-warn">Select a character first</div>`;
  else if(charIsEnemy) html+=`<div class="dd-warn">Cannot command enemy units</div>`;
  else if(isOwnGroup) html+=`<div class="dd-warn">Cannot interact with own group</div>`;

  dd.innerHTML=html;
  dd.classList.add('open');

  // Position
  const x=Math.min(ev.clientX,window.innerWidth-200);
  const y=Math.min(ev.clientY,window.innerHeight-actions.length*32-60);
  dd.style.left=x+'px';dd.style.top=y+'px';

  // Click handlers
  dd.querySelectorAll('.dd-opt:not(.disabled)').forEach(opt=>{
    opt.addEventListener('click',e2=>{
      e2.stopPropagation();
      addTask(opt.dataset.action,obj,state);
      closeDD();
    });
  });
}

function closeDD(){dd.classList.remove('open');dd.innerHTML='';}

function addTask(actionName,targetObj,state){
  const ch=memberById(selCharId);
  const grp=groupOfMember(selCharId);
  if(!ch||!grp) return;
  const hasTarget=['Gather Resources','Cut Down','Move','Take','Search for','Attack','Examine','Harvest','Loot'].includes(actionName);
  const newId='t'+Date.now();
  tasks.push({id:newId,name:actionName,hasTarget,target:hasTarget?targetObj:null,assignee:ch,groupId:grp.id,progress:0});
  lastAddedTaskId=newId;
  renderAll();
  // Clear flash flag after animation completes
  setTimeout(()=>{lastAddedTaskId=null;},1300);
}

function colResize(hId,leftId,rightId){
  const h=document.getElementById(hId);
  let drag=false,sx,lw;
  h.addEventListener('mousedown',e=>{
    drag=true;sx=e.clientX;lw=document.getElementById(leftId).getBoundingClientRect().width;
    h.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none';
    const mv=e=>{if(!drag)return;const dx=e.clientX-sx;const nw=Math.max(120,lw+dx);
      document.getElementById(leftId).style.width=nw+'px';document.getElementById(leftId).style.flex='none';
      if(rightId==='zonepanel'){document.getElementById(rightId).style.flex='1';}
    };
    const up=()=>{drag=false;h.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect='';
      window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  });
}
colResize('ch1','taskpanel','grppanel');

// Row resize
function rowResize(hId,topId,botId){
  const h=document.getElementById(hId);
  let drag=false,sy,th,bh;
  h.addEventListener('mousedown',e=>{
    drag=true;sy=e.clientY;th=document.getElementById(topId).getBoundingClientRect().height;bh=document.getElementById(botId).getBoundingClientRect().height;

      window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);

let activePreview=null;

function fxDotClass(type){
  if(type==='wound') return 'dot-wound';
  if(type==='hunger') return 'dot-hunger';
  if(type==='cold') return 'dot-cold';
  if(type==='buff') return 'dot-buff';
  return 'dot-debuff';
}
function fxBarClass(type){
  if(type==='wound') return 'fx-c-wound';
  if(type==='hunger') return 'fx-c-hunger';
  if(type==='cold') return 'fx-c-cold';
  if(type==='buff') return 'fx-c-buff';
  return 'fx-c-debuff';
}
function dirSymbol(dir){
  if(dir==='>' || dir==='>>') return '»';
  if(dir==='<' || dir==='<<') return '«';
  if(dir==='<>') return '⟨⟩';
  return '';
}

          </div>
          <div class="cp-stats">
            <div class="cp-stat-row"><span class="cp-stat-lbl">LVL</span><span class="cp-stat-val">${s.level||0}</span><div class="cp-stat-bar"><div class="cp-stat-bar-fill bar-lvl" style="width:${lvlPct}%"></div></div></div>
            <div class="cp-stat-row"><span class="cp-stat-lbl">HP</span><span class="cp-stat-val">${s.health||0}</span><div class="cp-stat-bar cp-stat-hp-track"><div class="cp-stat-bar-fill bar-hp" style="width:${hpPct}%"></div></div></div>
            <div class="cp-stat-row"><span class="cp-stat-lbl">STR</span><span class="cp-stat-val">${s.strength||0}</span></div>
            <div class="cp-stat-row"><span class="cp-stat-lbl">DEX</span><span class="cp-stat-val">${s.dexterity||0}</span></div>
            <div class="cp-stat-row"><span class="cp-stat-lbl">PRC</span><span class="cp-stat-val">${s.perception||0}</span></div>
          </div>
        </div>
        <div class="cv-right">
          <div class="cv-fx-area">
            <div class="cp-fx-title">STATUS EFFECTS</div>
            <div class="cp-fx-list">${fxHtml}</div>
          </div>
          <div class="cv-inv-area">
            <div class="cp-inv-header"><span class="cp-inv-title">INVENTORY</span><span class="cp-inv-cap">${carryUsed}/${carryMax}</span></div>
            <div class="cp-inv-items">${invHtml||'<span style="color:var(--text-faint);font-size:10px;font-style:italic;">Empty</span>'}</div>
          </div>
        </div>
      </div>
    </div>`;

  document.body.appendChild(view);
  openCharViews[ch.id]=view;

  // Position: center with stagger offset for multiple windows
  const vw=window.innerWidth,vh=window.innerHeight;
  const pw=view.offsetWidth,ph=view.offsetHeight;
  const offset=Object.keys(openCharViews).length*24;
  view.style.left=Math.max(8,Math.round((vw-pw)/2)+offset)+'px';
  view.style.top=Math.max(8,Math.round((vh-ph)/2)+offset)+'px';
  view.style.zIndex=++charViewZCounter;

  // Bring to front on any click inside
  view.addEventListener('mousedown',()=>{view.style.zIndex=++charViewZCounter;});

  // Close button
  view.querySelector('.cv-close').addEventListener('click',()=>{
    view.remove();delete openCharViews[ch.id];
  });

  // Drag by header
  const hdr=view.querySelector('.cv-header');
  let isDragging=false,dx=0,dy=0;
  hdr.addEventListener('mousedown',e=>{
    if(e.target.closest('.cv-close')) return;
    isDragging=true;
    dx=e.clientX-view.offsetLeft;
    dy=e.clientY-view.offsetTop;
    document.body.style.userSelect='none';
  });
  const onMove=e=>{
    if(!isDragging) return;
    let nx=e.clientX-dx,ny=e.clientY-dy;
    nx=Math.max(0,Math.min(window.innerWidth-60,nx));
    ny=Math.max(0,Math.min(window.innerHeight-40,ny));
    view.style.left=nx+'px';view.style.top=ny+'px';
  };
  const onUp=()=>{
    if(!isDragging) return;
    isDragging=false;
    document.body.style.userSelect='';
  };
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onUp);
  // Cleanup listeners when view is removed
  const origRemove=view.remove.bind(view);
  view.remove=()=>{
    window.removeEventListener('mousemove',onMove);
    window.removeEventListener('mouseup',onUp);
    origRemove();
  };

  // Status effect tooltips
  view.querySelectorAll('.cv-fx-item').forEach(item=>{
    item.addEventListener('mouseenter',()=>{
      const c=parseInt(item.dataset.fxCharges),mx=parseInt(item.dataset.fxMax);
      const pctFx=mx>0?Math.round(c/mx*100):0;
      const tp=item.dataset.fxType;
      const barCls=fxBarClass(tp);
      const dotCls=fxDotClass(tp);
      showTipRaw(item,`
        <div class="tip-title">${item.dataset.fxName}</div>
        <div class="tip-bar"><div class="tip-bar-fill ${barCls}" style="width:${pctFx}%"></div></div>
        <div class="tip-charges">${c} / ${mx} charges</div>
        <div>${item.dataset.fxDesc}</div>`);
    });
    item.addEventListener('mouseleave',()=>{hideTip();});
  });

  // Pile item tooltips in inventory
  view.querySelectorAll('.pile-item').forEach(pi=>{
    pi.addEventListener('mouseenter',()=>{
      const nm=pi.dataset.pname,tp=pi.dataset.ptype,qty=pi.dataset.pqty;
      const lbl=pi.dataset.plabel,icn=pi.dataset.picon,pcls=pi.dataset.pcls;
      const gmin=pi.dataset.gmin,gmax=pi.dataset.gmax;
      const icoCls=pcls==='pile-3'?' tip-pile-3':pcls==='pile-10'?' tip-pile-10':'';
      const goldStr=(gmin==='0'&&gmax==='0')?'No value':`${gmin}–${gmax} gold`;
      showTipRaw(pi,`
        <div class="tip-item-row"><div class="tip-item-ico${icoCls}">${svg(icn)}</div><div><div class="tip-title">${nm}${lbl?' — '+lbl:''}</div></div></div>
        <div class="tip-item-meta">Quantity: ${qty}</div>
        <div class="tip-item-meta">Type: ${tp}</div>
        <div class="tip-item-meta tip-gold">Value: ${goldStr}</div>`);
    });
    pi.addEventListener('mouseleave',()=>{hideTip();});
    pi.addEventListener('click',e=>{e.stopPropagation();});
  });
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderAll();
</script>
</body>
</html>
